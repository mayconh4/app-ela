<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>BELLA — Agendamento & Gestão de Beleza</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

    <symbol id="i-home" viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-5v-6h-2v6H6v-9H3z"/></symbol>
    <symbol id="i-cal" viewBox="0 0 24 24"><path d="M7 2v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2zm12 8v10H5V10z"/></symbol>

    <symbol id="i-nail" viewBox="0 0 24 24"><path d="M10 2h4a1 1 0 0 1 1 1v3.6l1.4 1.4a2 2 0 0 1 .6 1.4V20a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V9.4a2 2 0 0 1 .6-1.4L9 6.6V3a1 1 0 0 1 1-1zm-1 11v7h6v-7H9z"/></symbol>

    <symbol id="i-face" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM8.5 9a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm7 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zM12 18c-2.3 0-4.3-1.4-5-3.5h10c-.7 2.1-2.7 3.5-5 3.5z"/></symbol>

    <symbol id="i-net" viewBox="0 0 24 24"><path d="M12 2a4 4 0 0 1 1 7.9V12h5a2 2 0 0 1 2 2v.1a4 4 0 1 1-2 0V14h-5v-2.1A4 4 0 0 1 11 12H6v.1a4 4 0 1 1-2 0V14a2 2 0 0 1 2-2h5V9.9A4 4 0 0 1 12 2z"/></symbol>
    <symbol id="i-team" viewBox="0 0 24 24"><path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm8 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM2 19c0-2.7 3-4 6-4s6 1.3 6 4v1H2zm13.5-3.6c1.6.6 2.5 1.7 2.5 3.6v1h4v-1c0-2.2-2.6-3.4-6.5-3.6z"/></symbol>
    <symbol id="i-target" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 4a6 6 0 1 0 0 12 6 6 0 0 0 0-12zm0 4a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/></symbol>

</svg>

<div class="app">
  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="brand">
      <span class="logo"><svg><use href="#i-spark"/></svg></span>
      <div>BELLA<small>BELEZA & AGENDA</small></div>
    </div>
    <button class="icon-btn" id="userMenuBtn" title="Menu de usuário">
      <svg><use href="#i-user"/></svg>
    </button>
  </header>

  <!-- ============ CLIENTE: screens (rendered by app.js) ============ -->
  <main id="screens">
    <section class="screen active" id="scr-menu"></section>
    <section class="screen" id="scr-estab"></section>
    <section class="screen" id="scr-servicos"></section>
    <section class="screen" id="scr-prof"></section>
    <section class="screen" id="scr-horario"></section>
    <section class="screen" id="scr-meus"></section>

    <!-- PROFISSIONAL -->
    <section class="screen" id="scr-pro-onboard"></section>
    <section class="screen" id="scr-pro-cadastro"></section>
    <section class="screen" id="scr-pro-agenda"></section>
    <section class="screen" id="scr-pro-resumo"></section>
    <section class="screen" id="scr-pro-rede"></section>
    <section class="screen" id="scr-pro-equipe"></section>
    <section class="screen" id="scr-pro-metas"></section>
  </main>

  <!-- ============ TAB BAR ============ -->
  <nav class="tabbar glass-strong" id="tabbar"></nav>
</div>

<!-- ============ MODAL / SHEET ============ -->
<div class="overlay" id="overlay">
  <div class="sheet glass-strong" id="sheet">
    <div class="grab"></div>
    <div id="sheetBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
